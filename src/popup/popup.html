<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRM Chrome Tools</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <img src="../icons/icon32.png" alt="CRM Chrome Tools" class="header-icon" />
    <span class="header-title">CRM Chrome Tools</span>
  </header>

  <main>
    <section class="tool-group">
      <h2 class="tool-group-label">🛠 Tools</h2>
      <button id="btn-all-fields" class="tool-btn">
        📋 All Fields
      </button>
      <button id="btn-show-option-sets" class="tool-btn">
        🔘 Show Option Sets
      </button>
    </section>
  </main>

  <script src="popup.js"></script>
</body>
</html>
